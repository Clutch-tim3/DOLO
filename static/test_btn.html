<!DOCTYPE html>
<html>
<head>
<style>
.corner-btn {
  position: relative;
  display: inline-block;
  text-decoration: none;
  background: transparent;
  border: none;
  color: #ffffff;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 3px;
  padding: 14px 44px;
  cursor: pointer;
  outline: none;
  transition: color 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.1s ease;
  user-select: none;
}

.corner-btn span:not(.bracket) {
  position: relative;
  z-index: 2;
}

.corner-btn .bracket {
  position: absolute;
  width: 20px;
  height: 20px;
  border: 1px solid transparent;
  transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  pointer-events: none;
  z-index: 1;
}

.corner-btn .bracket-tr {
  top: -6px;
  right: -12px;
  border-top-color: #c5a880;
  border-right-color: #c5a880;
}

.corner-btn .bracket-bl {
  bottom: -6px;
  left: -12px;
  border-bottom-color: #c5a880;
  border-left-color: #c5a880;
}

.corner-btn:hover {
  color: #c5a880;
}

.corner-btn:hover .bracket-tr {
  top: 0;
  right: 0;
  width: 100%;
  height: 100%;
}

.corner-btn:hover .bracket-bl {
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100%;
}
</style>
</head>
<body style="background: black; padding: 100px;">
  <button class="corner-btn" id="btn1">
      <span>NEW BID SUBMISSION</span>
      <span class="bracket bracket-tr" id="tr1"></span>
      <span class="bracket bracket-bl" id="bl1"></span>
  </button>
  
  <script>
    setTimeout(() => {
      document.getElementById('btn1').classList.add('hover');
      // Force hover state for testing
      document.styleSheets[0].insertRule('.corner-btn.hover .bracket-tr { top: 0; right: 0; width: 100%; height: 100%; }', document.styleSheets[0].cssRules.length);
      document.styleSheets[0].insertRule('.corner-btn.hover .bracket-bl { bottom: 0; left: 0; width: 100%; height: 100%; }', document.styleSheets[0].cssRules.length);
      
      setTimeout(() => {
        const btn = document.getElementById('btn1').getBoundingClientRect();
        const tr = document.getElementById('tr1').getBoundingClientRect();
        const bl = document.getElementById('bl1').getBoundingClientRect();
        console.log("BTN:", btn.width, btn.height);
        console.log("TR:", tr.width, tr.height, tr.top - btn.top, tr.left - btn.left);
        console.log("BL:", bl.width, bl.height, bl.top - btn.top, bl.left - btn.left);
      }, 500);
    }, 100);
  </script>
</body>
</html>
